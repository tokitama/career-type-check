<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キャリアタイプ診断 | CAREER TYPE CHECK</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#e8e8e0;min-height:100vh;font-family:'DotGothic16',monospace;}

/* ========== ゲームボーイ部分 ========== */
.gb-outer{display:flex;justify-content:center;padding:1.5rem 0 2rem;}
.gb-device{background:#c0bfbe;border-radius:14px 14px 50px 50px;padding:18px 18px 36px;width:360px;box-shadow:inset 0 3px 0 #e8e6e3,inset 0 -3px 0 #888,2px 4px 0 #666;font-family:'DotGothic16',monospace;}
.gb-label{text-align:center;font-family:'Press Start 2P',monospace;font-size:7px;color:#6a6a8a;letter-spacing:3px;margin-bottom:10px;}
.gb-screen-bezel{background:#3a3a5a;border-radius:8px 8px 24px 24px;padding:16px 14px 14px;margin-bottom:18px;box-shadow:inset 0 3px 8px rgba(0,0,0,0.6);}
.gb-power-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.gb-power-dot{width:6px;height:6px;border-radius:50%;background:#e03030;box-shadow:0 0 4px #e03030;}
.gb-power-label{font-family:'Press Start 2P',monospace;font-size:5px;color:#9090b0;letter-spacing:1px;}
.gb-screen{background:#8bac0f;border-radius:4px;padding:10px;min-height:230px;position:relative;box-shadow:inset 0 0 10px rgba(0,0,0,0.4);}
.gb-scanlines{position:absolute;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);border-radius:4px;pointer-events:none;z-index:10;}
.gb-screen-title{font-family:'Press Start 2P',monospace;color:#0f380f;font-size:6px;text-align:center;margin-bottom:8px;letter-spacing:1px;}
.gb-prog-bg{background:#306230;height:4px;margin-bottom:8px;}
.gb-prog-fill{background:#0f380f;height:4px;transition:width 0.3s;}
.gb-qnum{color:#306230;font-size:13px;margin-bottom:4px;}
.gb-qtext{color:#0f380f;font-size:14px;line-height:1.7;margin-bottom:8px;min-height:56px;white-space:pre-line;}
.gb-hint{color:#306230;font-size:11px;margin-bottom:6px;}
.gb-choices{display:flex;flex-direction:column;gap:4px;}
.gb-choice{background:transparent;border:2px solid #0f380f;color:#0f380f;font-family:'DotGothic16',monospace;font-size:13px;padding:5px 8px;text-align:left;cursor:pointer;line-height:1.5;transition:background 0.1s,color 0.1s;}
.gb-choice:hover,.gb-choice:focus{background:#0f380f;color:#8bac0f;outline:none;}

/* トランジション画面 */
.gb-transit{display:none;text-align:center;padding-top:20px;}
.gb-transit-title{font-family:'Press Start 2P',monospace;color:#0f380f;font-size:7px;margin-bottom:16px;letter-spacing:1px;}
.gb-transit-icon{font-size:36px;margin-bottom:12px;display:block;}
.gb-transit-name{color:#0f380f;font-size:18px;font-weight:bold;margin-bottom:6px;}
.gb-transit-sub{color:#306230;font-size:12px;margin-bottom:16px;}
.gb-transit-btn{background:#0f380f;color:#8bac0f;border:none;font-family:'DotGothic16',monospace;font-size:14px;padding:8px 16px;cursor:pointer;letter-spacing:1px;}
.gb-transit-btn:hover{background:#306230;}

/* ゲームボーイコントローラー */
.gb-controls{display:flex;justify-content:space-between;align-items:center;padding:0 8px;}
.gb-dpad{display:grid;grid-template-columns:repeat(3,22px);grid-template-rows:repeat(3,22px);gap:2px;}
.dp{background:#888;border-radius:2px;}
.dp.c{background:#777;border-radius:2px;}
.gb-ab{display:flex;gap:12px;align-items:center;}
.ab-btn{width:26px;height:26px;border-radius:50%;background:#8a3a6a;box-shadow:0 2px 0 #5a2a4a;border:none;cursor:pointer;font-family:'Press Start 2P',monospace;font-size:7px;color:#e0a0c0;display:flex;align-items:center;justify-content:center;transition:transform 0.05s,box-shadow 0.05s;}
.ab-btn:active{transform:translateY(2px);box-shadow:none;}
.gb-start-select{display:flex;justify-content:center;gap:20px;margin-top:14px;}
.ss-btn{width:28px;height:8px;border-radius:4px;background:#888;cursor:pointer;transition:transform 0.05s;}
.ss-btn:active{transform:scale(0.95);}
.ss-label{font-family:'Press Start 2P',monospace;font-size:4px;color:#666;text-align:center;margin-top:3px;}
.btn-col{display:flex;flex-direction:column;align-items:center;}

/* ========== 結果ページ ========== */
.result-page{display:none;max-width:480px;margin:0 auto;padding:0 0 60px;}

.rp-hero{padding:32px 20px 24px;text-align:center;color:#fff;}
.rp-eyebrow{font-family:'Press Start 2P',monospace;font-size:7px;letter-spacing:2px;opacity:0.8;margin-bottom:12px;}
.rp-icon-circle{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:40px;box-shadow:0 4px 16px rgba(0,0,0,0.2);}
.rp-main-name{font-family:'Press Start 2P',monospace;font-size:13px;letter-spacing:1px;margin-bottom:6px;}
.rp-sub-name{font-size:14px;opacity:0.85;}

.rp-body{background:#fff;border-radius:0;padding:20px;}
.rp-section{margin-bottom:24px;}
.rp-section-label{font-family:'Press Start 2P',monospace;font-size:8px;color:#333;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.rp-section-label::before{content:'▶';font-size:7px;}

.rp-desc-main{font-size:15px;line-height:1.9;color:#333;margin-bottom:10px;}
.rp-desc-sub{font-size:13px;line-height:1.8;color:#666;margin-bottom:10px;}
.rp-combo-box{padding:12px 14px;border-radius:4px;font-size:13px;line-height:1.8;color:#fff;}

.rp-str-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0;}
.rp-str-item:last-child{border-bottom:none;}
.rp-str-icon{font-size:11px;margin-top:3px;flex-shrink:0;}
.rp-str-text{font-size:14px;line-height:1.7;color:#333;}

/* 強みを伸ばすSTEP */
.rp-step{margin-bottom:12px;position:relative;}
.rp-step-badge{display:inline-block;font-family:'Press Start 2P',monospace;font-size:6px;color:#fff;padding:4px 10px;margin-bottom:8px;}
.rp-step-text{font-size:14px;line-height:1.8;color:#333;}

/* フェードロック */
.rp-step-visible{}
.rp-steps-locked{position:relative;overflow:hidden;}
.rp-steps-locked-content{padding-bottom:40px;}
.rp-fade-overlay{position:absolute;bottom:0;left:0;right:0;height:100px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:8px;}
.rp-note-cta{font-family:'DotGothic16',monospace;font-size:14px;padding:10px 20px;border:none;color:#fff;cursor:pointer;letter-spacing:1px;margin-top:6px;}
.rp-note-cta:hover{opacity:0.85;}
.rp-locked-label{font-family:'Press Start 2P',monospace;font-size:6px;color:#999;margin-bottom:6px;}

/* スコアバー */
.rp-score-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.rp-score-label{font-size:12px;color:#666;width:80px;flex-shrink:0;}
.rp-score-track{flex:1;background:#eee;border-radius:2px;height:8px;}
.rp-score-fill{height:8px;border-radius:2px;transition:width 0.8s;}
.rp-score-num{font-size:12px;color:#666;width:36px;text-align:right;}

/* noteセクション */
.rp-note-box{border:2px solid #333;padding:18px;text-align:center;}
.rp-note-eyebrow{font-family:'Press Start 2P',monospace;font-size:6px;color:#999;letter-spacing:2px;margin-bottom:10px;}
.rp-note-text{font-size:14px;line-height:1.8;color:#333;margin-bottom:12px;}
.rp-note-tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:14px;}
.rp-note-tag{font-size:11px;padding:3px 10px;border-radius:20px;color:#fff;}
.rp-note-btn{font-family:'DotGothic16',monospace;font-size:14px;padding:12px 24px;border:none;cursor:pointer;color:#fff;letter-spacing:1px;display:block;width:100%;}
.rp-note-btn:hover{opacity:0.85;}

.rp-restart{display:block;width:calc(100% - 40px);margin:20px auto 0;padding:12px;background:#333;color:#fff;font-family:'DotGothic16',monospace;font-size:14px;border:none;cursor:pointer;letter-spacing:1px;}
.rp-restart:hover{background:#555;}

/* ポップアップ */
.popup-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;}
.popup-overlay.active{display:flex;}
.popup-box{background:#0f380f;border:3px solid #8bac0f;padding:24px;max-width:300px;width:90%;text-align:center;}
.popup-icon{font-size:32px;margin-bottom:12px;}
.popup-msg{font-family:'DotGothic16',monospace;color:#8bac0f;font-size:15px;line-height:1.8;margin-bottom:16px;}
.popup-close{background:#8bac0f;color:#0f380f;border:none;font-family:'DotGothic16',monospace;font-size:13px;padding:6px 20px;cursor:pointer;}
</style>
</head>

</div>

<!-- ポップアップ -->

function showPopup(msgs, idxRef, key){
  const m = msgs[idxRef % msgs.length];
  document.getElementById("popup-icon").textContent = m.icon;
  document.getElementById("popup-msg").textContent = m.msg;
  document.getElementById("popup").classList.add("active");
  if(key==="a") msgIdxA++;
  else if(key==="b") msgIdxB++;

// ========== クイズロジック ==========
let current = 0;
let scores = [0,0,0,0,0];

function renderQ(){
  const q = QA[current];
  document.getElementById("prog-fill").style.width = ((current+1)/QA.length*100)+"%";
  document.getElementById("gb-qnum").textContent = "しつもん "+(current+1)+" / "+QA.length;
  document.getElementById("gb-qtext").textContent = q.q;
  const ch = document.getElementById("gb-choices");
  ch.innerHTML = "";
  q.opts.forEach(([label, typeIdx])=>{
    const btn = document.createElement("button");
    btn.className = "gb-choice";
    btn.textContent = label;
    btn.onclick = ()=>{
      scores[typeIdx]++;
      current++;
      if(current >= QA.length) showTransit();
      else renderQ();
    };
    ch.appendChild(btn);
  });
}

function showTransit(){
  const sorted = scores.map((s,i)=>({s,i})).sort((a,b)=>b.s-a.s);
  const main = TYPES[sorted[0].i];
  document.getElementById("quiz-view").style.display="none";
  document.getElementById("transit-view").style.display="block";
  document.getElementById("tr-icon").textContent = main.icon;
  document.getElementById("tr-name").textContent = main.name;
  document.getElementById("tr-sub").textContent = main.en;
  document.getElementById("go-result-btn").onclick = showResult;
}

function showResult(){
  const sorted = scores.map((s,i)=>({s,i})).sort((a,b)=>b.s-a.s);
  const mi = sorted[0].i, si = sorted[1].i;
  const main = TYPES[mi], sub = TYPES[si], tc = main.tc;
  const total = scores.reduce((a,b)=>a+b,0)||1;

  // ヒーロー
  document.getElementById("rp-hero").style.background = tc.heroGrad;
  document.getElementById("rp-icon-circle").style.background = "rgba(255,255,255,0.2)";
  document.getElementById("rp-icon").textContent = main.icon;
  document.getElementById("rp-main-name").textContent = main.name;
  document.getElementById("rp-sub-name").textContent = main.en + "  |  サブ: " + sub.name;

  // 説明
  document.getElementById("rp-main-desc").textContent = main.mainDesc;
  document.getElementById("rp-sub-desc").textContent = "サブタイプ「"+sub.name+"」の影響："+sub.subDesc;
  const combo = document.getElementById("rp-combo");
  combo.textContent = "✦ "+COMBOS[mi][si];
  combo.style.background = tc.comboBg;

  // 強み
  document.getElementById("rp-strengths").innerHTML = main.strengths.map(s=>`
    <div class="rp-str-item" style="border-bottom-color:${tc.accent};">
      <span class="rp-str-icon" style="color:${tc.bg};">▶</span>
      <span class="rp-str-text">${s}</span>
    </div>`).join("");

  // STEP1表示、STEP2-3フェード
  document.getElementById("rp-step1").innerHTML = `
    <div class="rp-step">
      <div class="rp-step-badge" style="background:${tc.bg};">${main.grow[0].phase}</div>
      <div class="rp-step-text">${main.grow[0].text}</div>
    </div>`;
  document.getElementById("rp-steps23").innerHTML = main.grow.slice(1).map(g=>`
    <div class="rp-step">
      <div class="rp-step-badge" style="background:${tc.bg};">${g.phase}</div>
      <div class="rp-step-text">${g.text}</div>
    </div>`).join("");
  const fade = document.getElementById("rp-fade-overlay");
  fade.style.background = `linear-gradient(to bottom, transparent, #fff 60%)`;
  document.getElementById("rp-step-note-btn").style.background = tc.noteBtn;
  document.getElementById("rp-step-note-btn").onclick = ()=>{ window.open("https://note.com/your-note-url","_blank"); };

  // スコア
  document.getElementById("rp-score").innerHTML = TYPES.map((t,i)=>`
    <div class="rp-score-row">
      <span class="rp-score-label">${t.icon} ${t.name.replace("タイプ","")}</span>
      <div class="rp-score-track" style="background:${tc.trackBg};">
        <div class="rp-score-fill" style="width:${Math.round(scores[i]/total*100)}%;background:${tc.bg};"></div>
      </div>
      <span class="rp-score-num">${Math.round(scores[i]/total*100)}%</span>
    </div>`).join("");

  // note誘導
  const noteBox = document.getElementById("rp-note-box");
  noteBox.style.borderColor = tc.bg;
  document.getElementById("rp-note-text").textContent = main.noteText;
  document.getElementById("rp-note-tags").innerHTML = main.noteTags.map(t=>`<span class="rp-note-tag" style="background:${tc.bg};">${t}</span>`).join("");
  document.getElementById("rp-note-btn").style.background = tc.noteBtn;
  document.getElementById("rp-note-btn").onclick = ()=>{ window.open("https://note.com/your-note-url","_blank"); };

  document.getElementById("restart-btn").onclick = restart;

  // 切り替え
  document.getElementById("gb-wrap").style.display = "none";
  document.getElementById("result-page").style.display = "block";
  window.scrollTo(0,0);
}

function restart(){
  current=0; scores=[0,0,0,0,0];
  document.getElementById("result-page").style.display="none";
  document.getElementById("gb-wrap").style.display="block";
  document.getElementById("transit-view").style.display="none";
  document.getElementById("quiz-view").style.display="block";
  renderQ();
}

renderQ();
